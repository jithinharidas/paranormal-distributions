{{ define "main" }}
<div class="container">
  <article class="post">

    <header class="post__header fade-up">
      {{ with .Params.categories }}
      <div class="post__cats">
        {{ range . }}<span class="cat-tag">{{ . }}</span>{{ end }}
      </div>
      {{ end }}
      <h1 class="post__title">{{ .Title }}</h1>
      <div class="post__meta">
        <span>{{ .Date.Format "January 02, 2006" }}</span>
        <span>{{ .ReadingTime }} min read</span>
      </div>
      <div class="post__divider"></div>
    </header>

    <div class="post__content fade-up fade-up-2">
      {{ .Content }}
    </div>

    <div class="share-bar fade-up">
      <span class="share-bar__label">share</span>
      <button class="share-btn" id="shareNative" aria-label="Share" style="display:none;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </button>
      <a class="share-btn" href="https://twitter.com/intent/tweet?text={{ .Title | urlquery }}&url={{ .Permalink | urlquery }}" target="_blank" rel="noopener" aria-label="Share on X">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.259 5.631L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/></svg>
      </a>
      <a class="share-btn" href="https://www.linkedin.com/sharing/share-offsite/?url={{ .Permalink | urlquery }}" target="_blank" rel="noopener" aria-label="Share on LinkedIn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      </a>
      <button class="share-btn" id="copyLink" aria-label="Copy link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      </button>
    </div>

    <script>
      var shareNative = document.getElementById('shareNative');
      var copyLink    = document.getElementById('copyLink');
      if (navigator.share) {
        shareNative.style.display = 'flex';
        shareNative.addEventListener('click', function() {
          navigator.share({ title: document.title, url: location.href });
        });
      }
      copyLink.addEventListener('click', function() {
        navigator.clipboard.writeText(location.href).then(function() {
          copyLink.classList.add('copied');
          setTimeout(function() { copyLink.classList.remove('copied'); }, 2000);
        });
      });
    </script>

  </article>
</div>
{{ end }}
