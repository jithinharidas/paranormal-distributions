<div class="diagram-scroll"><svg viewBox="0 0 820 380" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;font-family:'JetBrains Mono',monospace;">
  <rect width="820" height="380" rx="6" fill="#12151c"/>

  <text x="410" y="28" text-anchor="middle" fill="#3d4557" font-size="10" letter-spacing="2">THE WHATSAPP GROUP · EVERY USER BASE EVER</text>

  <!-- Header row -->
  <text x="110" y="54" text-anchor="middle" fill="#6b778f" font-size="9">CHARACTER</text>
  <text x="360" y="54" text-anchor="middle" fill="#6b778f" font-size="9">WHAT THEY DO</text>
  <text x="650" y="54" text-anchor="middle" fill="#6b778f" font-size="9">USER EQUIVALENT</text>
  <line x1="20" y1="60" x2="800" y2="60" stroke="#1e2333" stroke-width="1"/>

  <!-- Row 1: Forwarding Uncle -->
  <rect x="20" y="66" width="780" height="46" rx="2" fill="#1e2333" fill-opacity="0.5"/>
  <text x="30" y="84" fill="#ff6b35" font-size="10" font-weight="600">Forwarding Uncle</text>
  <text x="30" y="100" fill="#3d4557" font-size="9">RFM: High F, Low M</text>
  <text x="220" y="84" fill="#c8cfe0" font-size="9">Good morning images, fake news,</text>
  <text x="220" y="98" fill="#c8cfe0" font-size="9">motivational quotes. 7am without fail.</text>
  <text x="530" y="84" fill="#6b778f" font-size="9">Opens everything. Clicks everything.</text>
  <text x="530" y="98" fill="#6b778f" font-size="9">Buys nothing. Great DAU, terrible revenue.</text>

  <!-- Row 2: NRI -->
  <rect x="20" y="118" width="780" height="46" rx="2" fill="#12151c" fill-opacity="0.5"/>
  <text x="30" y="136" fill="#ff6b35" font-size="10" font-weight="600">The NRI</text>
  <text x="30" y="152" fill="#3d4557" font-size="9">RFM: Low F, High M</text>
  <text x="220" y="136" fill="#c8cfe0" font-size="9">Silent for months. Appears at Diwali:</text>
  <text x="220" y="150" fill="#c8cfe0" font-size="9">"what's a good gift under 5k?"</text>
  <text x="530" y="136" fill="#6b778f" font-size="9">Seasonal, high value when active.</text>
  <text x="530" y="150" fill="#6b778f" font-size="9">Your retention team cannot explain them.</text>

  <!-- Row 3: The Reactor -->
  <rect x="20" y="170" width="780" height="46" rx="2" fill="#1e2333" fill-opacity="0.5"/>
  <text x="30" y="188" fill="#ff6b35" font-size="10" font-weight="600">The Reactor</text>
  <text x="30" y="204" fill="#3d4557" font-size="9">RFM: High F, Zero M</text>
  <text x="220" y="188" fill="#c8cfe0" font-size="9">Only sends thumbs up and laugh emojis.</text>
  <text x="220" y="202" fill="#c8cfe0" font-size="9">Never types. Always watching.</text>
  <text x="530" y="188" fill="#6b778f" font-size="9">High session frequency, zero conversion.</text>
  <text x="530" y="202" fill="#6b778f" font-size="9">Loves your app. Has never paid for it.</text>

  <!-- Row 4: Group Admin -->
  <rect x="20" y="222" width="780" height="46" rx="2" fill="#12151c" fill-opacity="0.5"/>
  <text x="30" y="240" fill="#ff6b35" font-size="10" font-weight="600">The Group Admin</text>
  <text x="30" y="256" fill="#3d4557" font-size="9">RFM: High F, High M</text>
  <text x="220" y="240" fill="#c8cfe0" font-size="9">Posts rules. Pins messages. Adds people</text>
  <text x="220" y="254" fill="#c8cfe0" font-size="9">without asking. Thinks they run things.</text>
  <text x="530" y="240" fill="#6b778f" font-size="9">Power user. High LTV. Refers others.</text>
  <text x="530" y="254" fill="#6b778f" font-size="9">Treat them well. They notice everything.</text>

  <!-- Row 5: The Ghost -->
  <rect x="20" y="274" width="780" height="46" rx="2" fill="#1e2333" fill-opacity="0.5"/>
  <text x="30" y="292" fill="#ff6b35" font-size="10" font-weight="600">The Ghost</text>
  <text x="30" y="308" fill="#3d4557" font-size="9">RFM: Zero everything</text>
  <text x="220" y="292" fill="#c8cfe0" font-size="9">Last seen March 2022. Still in the group.</text>
  <text x="220" y="306" fill="#c8cfe0" font-size="9">Nobody removes them. Hope dies last.</text>
  <text x="530" y="292" fill="#6b778f" font-size="9">Dormant user. Probably churned.</text>
  <text x="530" y="306" fill="#6b778f" font-size="9">Still inflating your install numbers.</text>

  <!-- Row 6: Late Replier -->
  <rect x="20" y="326" width="780" height="40" rx="2" fill="#12151c" fill-opacity="0.5"/>
  <text x="30" y="344" fill="#ff6b35" font-size="10" font-weight="600">The Late Replier</text>
  <text x="30" y="358" fill="#3d4557" font-size="9">RFM: Unpredictable</text>
  <text x="220" y="344" fill="#c8cfe0" font-size="9">Responds to a 3-day-old message urgently.</text>
  <text x="530" y="344" fill="#6b778f" font-size="9">Irregular cadence. Breaks your cohort logic.</text>
  <text x="530" y="358" fill="#6b778f" font-size="9">Real, just noisy.</text>
</svg></div>
