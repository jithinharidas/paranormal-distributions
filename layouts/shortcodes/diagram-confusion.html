<svg viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;font-family:'JetBrains Mono',monospace;">
  <rect width="680" height="340" rx="6" fill="#1c1815"/>

  <text x="340" y="24" text-anchor="middle" fill="#5e564b" font-size="10" letter-spacing="2">CONFUSION MATRIX · WHY ACCURACY MISLEADS</text>

  <!-- Column headers -->
  <text x="310" y="52" text-anchor="middle" fill="#9a8f7d" font-size="11">Predicted: NO</text>
  <text x="500" y="52" text-anchor="middle" fill="#9a8f7d" font-size="11">Predicted: YES</text>

  <!-- Row headers -->
  <text x="110" y="130" text-anchor="middle" fill="#9a8f7d" font-size="11">Actual: NO</text>
  <text x="110" y="240" text-anchor="middle" fill="#9a8f7d" font-size="11">Actual: YES</text>

  <!-- TN cell — big, good -->
  <rect x="190" y="62" width="220" height="110" rx="4" fill="#241f1a" stroke="#2e2823"/>
  <text x="300" y="108" text-anchor="middle" fill="#f0e6d2" font-size="36" font-weight="bold">8,100</text>
  <text x="300" y="134" text-anchor="middle" fill="#9a8f7d" font-size="11">True Negatives</text>
  <text x="300" y="150" text-anchor="middle" fill="#5e564b" font-size="10">correctly said "won't churn"</text>

  <!-- FP cell -->
  <rect x="420" y="62" width="220" height="110" rx="4" fill="#241f1a" stroke="#2e2823"/>
  <text x="530" y="108" text-anchor="middle" fill="#f0e6d2" font-size="36" font-weight="bold">800</text>
  <text x="530" y="134" text-anchor="middle" fill="#9a8f7d" font-size="11">False Positives</text>
  <text x="530" y="150" text-anchor="middle" fill="#5e564b" font-size="10">incorrectly flagged as churn</text>

  <!-- FN cell — bad, missed churners -->
  <rect x="190" y="182" width="220" height="110" rx="4" fill="#ec4899" fill-opacity="0.08" stroke="#ec4899" stroke-opacity="0.3"/>
  <text x="300" y="228" text-anchor="middle" fill="#ec4899" font-size="36" font-weight="bold">900</text>
  <text x="300" y="254" text-anchor="middle" fill="#ec4899" font-size="11">False Negatives</text>
  <text x="300" y="270" text-anchor="middle" fill="#ec4899" fill-opacity="0.7" font-size="10">missed actual churners</text>

  <!-- TP cell -->
  <rect x="420" y="182" width="220" height="110" rx="4" fill="#ec4899" fill-opacity="0.15" stroke="#ec4899" stroke-opacity="0.5"/>
  <text x="530" y="228" text-anchor="middle" fill="#ec4899" font-size="36" font-weight="bold">200</text>
  <text x="530" y="254" text-anchor="middle" fill="#ec4899" font-size="11">True Positives</text>
  <text x="530" y="270" text-anchor="middle" fill="#ec4899" fill-opacity="0.7" font-size="10">correctly caught churners</text>

  <!-- Accuracy note -->
  <text x="340" y="314" text-anchor="middle" fill="#5e564b" font-size="10">Accuracy: 93% · Looks great · But only caught 200 of 1,100 actual churners</text>
</svg>
