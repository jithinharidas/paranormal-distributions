<svg viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;font-family:'JetBrains Mono',monospace;">
  <rect width="680" height="360" rx="6" fill="#12151c"/>

  <text x="340" y="24" text-anchor="middle" fill="#3d4557" font-size="10" letter-spacing="2">AVERAGE LIFETIME VALUE BY COHORT</text>

  <!-- Y axis -->
  <line x1="100" y1="40" x2="100" y2="290" stroke="#262d3f" stroke-width="1"/>
  <line x1="100" y1="290" x2="620" y2="290" stroke="#262d3f" stroke-width="1"/>

  <!-- Y grid + labels -->
  <line x1="100" y1="190" x2="620" y2="190" stroke="#262d3f" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="100" y1="140" x2="620" y2="140" stroke="#262d3f" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="100" y1="90" x2="620" y2="90" stroke="#262d3f" stroke-width="0.5" stroke-dasharray="3,3"/>

  <text x="90" y="294" text-anchor="end" fill="#3d4557" font-size="10">0</text>
  <text x="90" y="194" text-anchor="end" fill="#3d4557" font-size="10">5k</text>
  <text x="90" y="144" text-anchor="end" fill="#3d4557" font-size="10">7.5k</text>
  <text x="90" y="94" text-anchor="end" fill="#3d4557" font-size="10">10k</text>

  <!-- Champions bar -->
  <rect x="130" y="55" width="90" height="235" rx="3" fill="#ff6b35"/>
  <text x="175" y="48" text-anchor="middle" fill="#ff6b35" font-size="13" font-weight="bold">12,400</text>
  <text x="175" y="310" text-anchor="middle" fill="#c8cfe0" font-size="11">Champions</text>
  <text x="175" y="325" text-anchor="middle" fill="#3d4557" font-size="10">High F · High M</text>

  <!-- Loyal bar -->
  <rect x="270" y="130" width="90" height="160" rx="3" fill="#ff6b35" fill-opacity="0.55"/>
  <text x="315" y="123" text-anchor="middle" fill="#ff6b35" font-size="13" font-weight="bold">7,800</text>
  <text x="315" y="310" text-anchor="middle" fill="#c8cfe0" font-size="11">Loyal</text>
  <text x="315" y="325" text-anchor="middle" fill="#3d4557" font-size="10">Regular · Medium M</text>

  <!-- At Risk bar -->
  <rect x="410" y="200" width="90" height="90" rx="3" fill="#ff6b35" fill-opacity="0.3"/>
  <text x="455" y="193" text-anchor="middle" fill="#ff6b35" font-size="13" font-weight="bold">3,200</text>
  <text x="455" y="310" text-anchor="middle" fill="#c8cfe0" font-size="11">At Risk</text>
  <text x="455" y="325" text-anchor="middle" fill="#3d4557" font-size="10">Fading · Worth saving</text>

  <!-- Dormant bar -->
  <rect x="550" y="262" width="90" height="28" rx="3" fill="#262d3f"/>
  <text x="595" y="255" text-anchor="middle" fill="#6b778f" font-size="13" font-weight="bold">800</text>
  <text x="595" y="310" text-anchor="middle" fill="#6b778f" font-size="11">Dormant</text>
  <text x="595" y="325" text-anchor="middle" fill="#3d4557" font-size="10">Gone · Mostly</text>

  <!-- Y axis label -->
  <text x="30" y="175" text-anchor="middle" fill="#3d4557" font-size="10" transform="rotate(-90,30,175)">Avg Lifetime Value (INR)</text>

  <!-- Gap annotation -->
  <line x1="175" y1="55" x2="455" y2="55" stroke="#3d4557" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="315" y="50" text-anchor="middle" fill="#3d4557" font-size="9">4x difference</text>
</svg>
